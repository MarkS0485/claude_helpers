name: CI

# Byte-compile the scripts and run the unit tests on every push / PR. The
# scripts are stdlib-only, so this runs on Linux; doc-only changes are skipped.
# Tested on the oldest Python the README promises (3.8) and the latest 3.x.

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**/*.md' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**/*.md' ]
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.8 (oldest supported)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Compile & test on 3.8
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v

      - name: Set up latest Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Compile & test on latest
        run: |
          python -m compileall -q .
          python -m unittest discover -s tests -v
