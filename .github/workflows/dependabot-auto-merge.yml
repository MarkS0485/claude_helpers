name: Dependabot auto-merge

# Aggressive dependency automation: once CI is green, patch and minor Dependabot
# PRs merge themselves. Major bumps are left for a human to look at — flip the
# `if` below to also include 'version-update:semver-major' to auto-merge those.
#
# `gh pr merge --auto` waits for the required "Build & test" check (configured in
# branch protection), so nothing ever lands red.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge (patch & minor)
        if: >
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
